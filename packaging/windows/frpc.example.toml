# Example frpc config for one local Gardener instance using the VPS relay.
# Normally users do not edit this file; install-gardener.ps1 writes frpc.toml from SetupKey provisioning.
serverAddr = "YOUR_VPS_IP"
serverPort = 27000

auth.method = "token"
auth.token = "CHANGE_ME_SHARED_FRP_TOKEN"

[[proxies]]
name = "gardener-user-a"
type = "tcp"
localIP = "127.0.0.1"
localPort = 8080
remotePort = 18082
