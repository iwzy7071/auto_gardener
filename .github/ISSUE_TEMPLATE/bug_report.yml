name: Bug report
description: Report a reproducible problem in Gardener
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please remove passwords, tokens, server addresses, and private file contents before submitting.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start Gardener with ...
        2. Create a task ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Gardener version or commit
      placeholder: v0.1.0 or git commit SHA
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant logs only after removing secrets.
      render: text
