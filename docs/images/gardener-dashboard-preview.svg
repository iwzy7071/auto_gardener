<svg width="1100" height="620" viewBox="0 0 1100 620" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Gardener task dashboard preview</title>
  <desc id="desc">Illustrative preview of Gardener showing a chat panel, runtime dashboard, progress timeline, and file preview.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1100" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF7D6"/>
      <stop offset="1" stop-color="#DCECCB"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#334155" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1100" height="620" rx="38" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="58" y="54" width="984" height="512" rx="30" fill="#fffdf7" opacity="0.94"/>
  </g>
  <rect x="86" y="86" width="310" height="448" rx="24" fill="#F8FAF5" stroke="#E4E8DC"/>
  <circle cx="123" cy="124" r="19" fill="#DDF4CD"/>
  <text x="154" y="131" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="750" fill="#1F2937">Gardener</text>
  <rect x="112" y="172" width="230" height="58" rx="18" fill="#EEF5FF"/>
  <text x="132" y="198" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#334155">Please refactor this module</text>
  <text x="132" y="216" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#334155">and keep Windows support.</text>
  <rect x="136" y="258" width="224" height="86" rx="18" fill="#F1F7EC"/>
  <text x="156" y="285" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#334155">I split it into 3 subtasks.</text>
  <text x="156" y="305" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#334155">Progress checks are safe and</text>
  <text x="156" y="325" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#334155">will not interrupt the job.</text>
  <rect x="112" y="466" width="190" height="38" rx="19" fill="#FFFFFF" stroke="#E4E8DC"/>
  <text x="132" y="490" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#64748B">Message Gardener...</text>
  <rect x="314" y="466" width="54" height="38" rx="18" fill="#4E9560"/>
  <text x="328" y="490" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="750" fill="#FFFFFF">Send</text>

  <rect x="424" y="86" width="588" height="154" rx="24" fill="#FFFFFF" stroke="#E4E8DC"/>
  <text x="454" y="123" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="800" fill="#111827">Task dashboard</text>
  <rect x="842" y="101" width="126" height="28" rx="14" fill="#FFF2C7"/>
  <text x="861" y="121" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="750" fill="#8A5A00">No output 12m</text>
  <g font-family="Inter, system-ui, sans-serif" font-size="12" fill="#64748B">
    <rect x="454" y="146" width="120" height="58" rx="16" fill="#FBFAF4" stroke="#EEF0E8"/><text x="474" y="168">Duration</text><text x="474" y="192" font-size="18" font-weight="800" fill="#111827">42m</text>
    <rect x="594" y="146" width="120" height="58" rx="16" fill="#FBFAF4" stroke="#EEF0E8"/><text x="614" y="168">Idle</text><text x="614" y="192" font-size="18" font-weight="800" fill="#111827">12m</text>
    <rect x="734" y="146" width="120" height="58" rx="16" fill="#FBFAF4" stroke="#EEF0E8"/><text x="754" y="168">Stage</text><text x="754" y="192" font-size="18" font-weight="800" fill="#111827">2</text>
    <rect x="874" y="146" width="106" height="58" rx="16" fill="#FBFAF4" stroke="#EEF0E8"/><text x="894" y="168">Subtasks</text><text x="894" y="192" font-size="18" font-weight="800" fill="#111827">1/4</text>
  </g>

  <rect x="424" y="262" width="280" height="272" rx="24" fill="#FFFFFF" stroke="#E4E8DC"/>
  <text x="454" y="300" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="800" fill="#111827">Work progress</text>
  <circle cx="462" cy="337" r="6" fill="#4E9560"/><line x1="462" y1="343" x2="462" y2="486" stroke="#D9E6D1" stroke-width="3"/>
  <g font-family="Inter, system-ui, sans-serif" font-size="13" fill="#334155">
    <text x="486" y="342">Planning completed</text>
    <text x="486" y="386">Subtasks running</text>
    <text x="486" y="430">Validation queued</text>
    <text x="486" y="474">Watchdog cue shown</text>
  </g>
  <circle cx="462" cy="381" r="6" fill="#4E9560"/><circle cx="462" cy="425" r="6" fill="#94A3B8"/><circle cx="462" cy="469" r="6" fill="#F59E0B"/>

  <rect x="728" y="262" width="284" height="272" rx="24" fill="#252A24"/>
  <text x="758" y="300" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="800" fill="#EAF5E6">File preview</text>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#CFE8C7">
    <text x="758" y="340"># Final report</text>
    <text x="758" y="370">Goal status: complete</text>
    <text x="758" y="400">- Changed files: 6</text>
    <text x="758" y="430">- Tests: passed</text>
    <text x="758" y="460">- Next action: review diff</text>
  </g>
</svg>
