<svg width="720" height="220" viewBox="0 0 720 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Gardener logo</title>
  <desc id="desc">A local-first AI task orchestration logo combining a sprout, terminal prompt, and branching work graph.</desc>
  <defs>
    <linearGradient id="bg" x1="32" y1="20" x2="190" y2="194" gradientUnits="userSpaceOnUse">
      <stop stop-color="#102A43"/>
      <stop offset="1" stop-color="#0B3D2E"/>
    </linearGradient>
    <linearGradient id="leaf" x1="80" y1="54" x2="158" y2="142" gradientUnits="userSpaceOnUse">
      <stop stop-color="#B7F397"/>
      <stop offset="1" stop-color="#2FB344"/>
    </linearGradient>
    <filter id="softShadow" x="0" y="0" width="240" height="240" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#071B14" flood-opacity="0.22"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <rect x="28" y="20" width="172" height="172" rx="42" fill="url(#bg)"/>
    <path d="M68 142C92 119 102 92 103 56C129 74 139 101 127 132" stroke="#D9F99D" stroke-width="10" stroke-linecap="round"/>
    <path d="M108 81C124 55 152 48 174 56C171 84 149 105 116 102C112 96 109 89 108 81Z" fill="url(#leaf)"/>
    <path d="M96 90C76 72 52 72 36 82C43 105 65 119 94 109C97 103 98 96 96 90Z" fill="#79D86B"/>
    <path d="M68 145H162" stroke="#7DD3FC" stroke-width="9" stroke-linecap="round"/>
    <path d="M75 164H128" stroke="#E0F2FE" stroke-width="9" stroke-linecap="round" opacity="0.92"/>
    <path d="M54 126L73 111L54 96" stroke="#E0F2FE" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="155" cy="130" r="8" fill="#38BDF8"/>
    <circle cx="173" cy="112" r="7" fill="#A7F3D0"/>
    <circle cx="174" cy="148" r="7" fill="#A7F3D0"/>
    <path d="M162 126L171 116M162 134L171 144" stroke="#A7F3D0" stroke-width="4" stroke-linecap="round"/>
  </g>

  <g fill="#0F172A">
    <text x="235" y="96" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="58" font-weight="800" letter-spacing="-2">Gardener</text>
    <text x="238" y="136" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="600" fill="#2563EB">Grow long-running AI coding work from local roots.</text>
    <text x="238" y="169" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17" fill="#475569">A local-first control plane for Codex, Claude, resumable tasks, and remote access.</text>
  </g>
</svg>
